name: Bug report
description: Report something Edgebase did incorrectly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should Edgebase have done?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, repo shape, and agent client involved.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Edgebase version or commit
      placeholder: v0.1.5
  - type: dropdown
    id: client
    attributes:
      label: Agent client
      options:
        - Claude Code
        - Codex
        - Cursor
        - Gemini CLI
        - OpenCode
        - Windsurf
        - Other
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste `python3 -m edgebase doctor --scope both` output if available.
      render: text
